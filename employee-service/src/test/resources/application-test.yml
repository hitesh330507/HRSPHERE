server:
  port: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/employee_db_test
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/employee_db_test
    user: test
    password: test
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

gateway:
  trust-headers-required: true

logging:
  level:
    com.hrsphere: DEBUG
