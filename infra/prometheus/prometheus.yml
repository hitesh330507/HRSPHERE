global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'hrsphere-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'auth-service:8081'
          - 'employee-service:8082'
          - 'department-service:8083'
          - 'leave-service:8084'
          - 'api-gateway:8080'
