spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

gateway:
  trust-headers-required: true

logging:
  level:
    root: INFO
    com.hrsphere: DEBUG
