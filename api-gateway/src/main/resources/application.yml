server:
  port: ${API_GATEWAY_PORT:8080}
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}

gateway:
  public-paths:
    - /api/v1/auth/register
    - /api/v1/auth/login
    - /api/v1/auth/refresh
    - /api/v1/*/actuator/**
    - /api/v1/auth/api-docs/**
    - /api/v1/auth/swagger-ui.html
    - /api/v1/auth/swagger-ui/**
    - /api/v1/employees/api-docs/**
    - /api/v1/employees/swagger-ui.html
    - /api/v1/employees/swagger-ui/**
    - /api/v1/department/api-docs/**
    - /api/v1/department/swagger-ui.html
    - /api/v1/department/swagger-ui/**
    - /api/v1/leave/api-docs/**
    - /api/v1/leave/swagger-ui.html
    - /api/v1/leave/swagger-ui/**

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      routes:
        - id: auth-docs-route
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/api-docs/**, /api/v1/auth/swagger-ui.html, /api/v1/auth/swagger-ui/**
          filters:
            - RewritePath=/api/v1/auth/(?<remaining>.*), /${remaining}
            - AddRequestHeader=X-Forwarded-Prefix, /api/v1/auth
        - id: auth-service-route
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: auth-service-cb
                fallbackUri: forward:/fallback/auth-service
        - id: employee-docs-route
          uri: http://employee-service:8082
          predicates:
            - Path=/api/v1/employees/api-docs/**, /api/v1/employees/swagger-ui.html, /api/v1/employees/swagger-ui/**
          filters:
            - RewritePath=/api/v1/employees/(?<remaining>.*), /${remaining}
            - AddRequestHeader=X-Forwarded-Prefix, /api/v1/employees
        - id: employee-service-route
          uri: http://employee-service:8082
          predicates:
            - Path=/api/v1/employees/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: employee-service-cb
                fallbackUri: forward:/fallback/employee-service
        - id: department-docs-route
          uri: http://department-service:8083
          predicates:
            - Path=/api/v1/department/api-docs/**, /api/v1/department/swagger-ui.html, /api/v1/department/swagger-ui/**
          filters:
            - RewritePath=/api/v1/department/(?<remaining>.*), /${remaining}
            - AddRequestHeader=X-Forwarded-Prefix, /api/v1/department
        - id: department-service-route
          uri: http://department-service:8083
          predicates:
            - Path=/api/v1/department/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: department-service-cb
                fallbackUri: forward:/fallback/department-service
        - id: leave-docs-route
          uri: http://leave-service:8084
          predicates:
            - Path=/api/v1/leave/api-docs/**, /api/v1/leave/swagger-ui.html, /api/v1/leave/swagger-ui/**
          filters:
            - RewritePath=/api/v1/leave/(?<remaining>.*), /${remaining}
            - AddRequestHeader=X-Forwarded-Prefix, /api/v1/leave
        - id: leave-service-route
          uri: http://leave-service:8084
          predicates:
            - Path=/api/v1/leave/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: leave-service-cb
                fallbackUri: forward:/fallback/leave-service

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 3s
    instances:
      employee-service-cb:
        baseConfig: default
      department-service-cb:
        baseConfig: default
      leave-service-cb:
        baseConfig: default
      auth-service-cb:
        baseConfig: default

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
