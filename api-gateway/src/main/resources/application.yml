server:
  port: ${API_GATEWAY_PORT:8080}
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}

gateway:
  public-paths:
    - /api/v1/auth/register
    - /api/v1/auth/login
    - /api/v1/auth/refresh
    - /api/v1/*/actuator/**

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service-route
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
        - id: employee-service-route
          uri: http://employee-service:8082
          predicates:
            - Path=/api/v1/employee/**
          filters:
            - StripPrefix=3

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
