server:
  port: ${API_GATEWAY_PORT:8080}
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}

gateway:
  public-paths:
    - /api/v1/auth/register
    - /api/v1/auth/login
    - /api/v1/auth/refresh
    - /api/v1/*/actuator/**
    - /api/v1/auth/api-docs/**
    - /api/v1/auth/swagger-ui.html
    - /api/v1/auth/swagger-ui/**
    - /api/v1/employees/api-docs/**
    - /api/v1/employees/swagger-ui.html
    - /api/v1/employees/swagger-ui/**
    - /api/v1/department/api-docs/**
    - /api/v1/department/swagger-ui.html
    - /api/v1/department/swagger-ui/**
    - /api/v1/leave/api-docs/**
    - /api/v1/leave/swagger-ui.html
    - /api/v1/leave/swagger-ui/**

spring:
  cloud:
    gateway:
      routes:
        - id: auth-docs-route
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/api-docs/**, /api/v1/auth/swagger-ui.html, /api/v1/auth/swagger-ui/**
          filters:
            - RewritePath=/api/v1/auth/(?<remaining>.*), /${remaining}
            - AddRequestHeader=X-Forwarded-Prefix, /api/v1/auth
        - id: auth-service-route
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
        - id: employee-docs-route
          uri: http://employee-service:8082
          predicates:
            - Path=/api/v1/employees/api-docs/**, /api/v1/employees/swagger-ui.html, /api/v1/employees/swagger-ui/**
          filters:
            - RewritePath=/api/v1/employees/(?<remaining>.*), /${remaining}
            - AddRequestHeader=X-Forwarded-Prefix, /api/v1/employees
        - id: employee-service-route
          uri: http://employee-service:8082
          predicates:
            - Path=/api/v1/employees/**
          filters:
            - StripPrefix=2
        - id: department-docs-route
          uri: http://department-service:8083
          predicates:
            - Path=/api/v1/department/api-docs/**, /api/v1/department/swagger-ui.html, /api/v1/department/swagger-ui/**
          filters:
            - RewritePath=/api/v1/department/(?<remaining>.*), /${remaining}
            - AddRequestHeader=X-Forwarded-Prefix, /api/v1/department
        - id: department-service-route
          uri: http://department-service:8083
          predicates:
            - Path=/api/v1/department/**
          filters:
            - StripPrefix=2
        - id: leave-docs-route
          uri: http://leave-service:8084
          predicates:
            - Path=/api/v1/leave/api-docs/**, /api/v1/leave/swagger-ui.html, /api/v1/leave/swagger-ui/**
          filters:
            - RewritePath=/api/v1/leave/(?<remaining>.*), /${remaining}
            - AddRequestHeader=X-Forwarded-Prefix, /api/v1/leave
        - id: leave-service-route
          uri: http://leave-service:8084
          predicates:
            - Path=/api/v1/leave/**
          filters:
            - StripPrefix=2

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
