services:
  postgres:
    image: postgres:16.1-alpine
    container_name: hrsphere-postgres
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - hrsphere_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - data-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hrsphere-redis
    env_file:
      - .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - hrsphere_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - data-net
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: hrsphere-auth-service
    env_file:
      - .env
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - data-net
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  employee-service:
    build:
      context: .
      dockerfile: employee-service/Dockerfile
    container_name: hrsphere-employee-service
    env_file:
      - .env
    environment:
      EMPLOYEE_DB_NAME: ${EMPLOYEE_DB_NAME}
      EMPLOYEE_SERVICE_PORT: ${EMPLOYEE_SERVICE_PORT}
    ports:
      - "${EMPLOYEE_SERVICE_PORT}:8082"
    networks:
      - backend-net
      - data-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: hrsphere-api-gateway
    env_file:
      - .env
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - gateway-net
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: hrsphere-nginx
    env_file:
      - .env
    ports:
      - "${NGINX_PORT:-8000}:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - gateway-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://api-gateway:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  adminer:
    image: adminer:latest
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    ports:
      - "8080:8080"
    networks:
      - data-net
    restart: unless-stopped

  rediscommander:
    image: rediscommander/redis-commander:latest
    profiles:
      - tools
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOSTS=local:redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - data-net
    restart: unless-stopped

volumes:
  hrsphere_pg_data:
  hrsphere_redis_data:

networks:
  gateway-net: # reserved for Nginx / API gateway in future days
    name: hrsphere_gateway-net
  backend-net: # reserved for Spring Boot microservices and inter-service traffic later
    name: hrsphere_backend-net
  data-net:
    name: hrsphere_data-net
